<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paid Ad Notifications — Web2.5 Demo</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 860px; margin: 24px auto; padding: 0 12px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin: 12px 0; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      button { padding: 10px 14px; margin: 6px 6px 6px 0; }
      input, textarea, select { width: 100%; padding: 8px; margin: 6px 0; }
      pre { background: #111; color: #f0f0f0; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      .muted { color: #666; font-size: 12px; }
    </style>
  </head>
  <body>
    <h1>Paid Ad Notifications (Web2.5)</h1>
    <p>Wallet-auth login, paid ad transfers, and wallet bridge for non-Phantom devices.</p>

    <div class="card">
      <div class="row">
        <div>
          <button id="connectPhantomBtn">Connect Phantom</button>
          <button id="connectRouterBtn">Connect Wallet Router App</button>
        </div>
        <div>
          <a href="./wallet-app.html" target="_blank">Open Separate Wallet App ↗</a>
        </div>
      </div>
      <button id="registerBtn" disabled>Register Wallet (sign nonce)</button>
      <div id="walletState"></div>
      <div class="muted">Build: <code id="buildTag">web2.5-pages-v1</code></div>
    </div>

    <div class="card">
      <h3>Advertiser Payment Test</h3>
      <label>Recipient Wallet</label>
      <input id="recipientWallet" placeholder="Recipient public key" />
      <label>Amount (SOL)</label>
      <input id="amountSol" type="number" step="0.0001" value="0.001" />
      <button id="payBtn" disabled>Send On-Chain Payment</button>
      <div id="payState"></div>
    </div>

    <div class="card">
      <h3>Local Registrations</h3>
      <div id="registrations"></div>
    </div>

    <pre id="log">Ready.</pre>

    <script src="https://unpkg.com/@solana/web3.js@1.95.2/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
    <script src="./main.js"></script>
  </body>
</html>
