name: Anchor Build (Devnet)

on:
  workflow_dispatch:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev build-essential

      - name: Install Solana CLI (stable)
        run: |
          curl -sSfL https://release.anza.xyz/stable/install | sh
          export PATH="$HOME/.local/share/solana/install/active_release/bin:$PATH"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          which solana
          solana --version

      - name: Install Anchor CLI (v0.30.1)
        run: |
          cargo install --git https://github.com/coral-xyz/anchor --tag v0.30.1 anchor-cli
          anchor --version

      - name: Verify SBF toolchain
        run: |
          cargo build-sbf --version

      - name: Build Anchor program (option1 toolchain path)
        working-directory: .
        run: |
          if [ -f .cargo/config.toml ]; then mv .cargo/config.toml .cargo/config.vendored.toml; fi
          anchor keys sync
          anchor build -- -- --locked

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: anchor-build-artifacts
          path: |
            target/idl/*.json
            target/deploy/*.so
          if-no-files-found: warn
