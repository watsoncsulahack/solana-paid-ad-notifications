<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wallet Router App (Demo)</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 760px; margin: 24px auto; padding: 0 12px; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; margin: 12px 0; }
      button { padding: 10px 14px; margin: 6px 6px 6px 0; }
      textarea, input { width: 100%; padding: 8px; margin: 6px 0; }
      pre { background: #111; color: #efefef; padding: 12px; border-radius: 8px; white-space: pre-wrap; }
      .warn { color: #b06000; }
    </style>
  </head>
  <body>
    <h1>Wallet Router App (Devnet Demo)</h1>
    <p class="warn">Demo wallet only. Do not use with real funds.</p>

    <div class="card">
      <button id="genBtn">Generate New Wallet</button>
      <button id="loadBtn">Load Saved Wallet</button>
      <button id="exportBtn">Export Secret Key</button>
      <button id="importBtn">Import Secret Key</button>
      <div id="wallet"></div>
    </div>

    <div class="card">
      <h3>Manual Actions</h3>
      <label>Message to sign</label>
      <textarea id="msg" rows="3">hello wallet router</textarea>
      <button id="signBtn">Sign Message</button>
      <div id="signed"></div>
    </div>

    <pre id="log">Wallet router idle.</pre>

    <script src="https://unpkg.com/@solana/web3.js@1.95.2/lib/index.iife.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tweetnacl@1.0.3/nacl.min.js"></script>
    <script src="./wallet-app.js"></script>
  </body>
</html>
